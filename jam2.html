<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>それだけでは食っていけないクリエイター祭り2026</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --bg-accent: #111111;
            --primary: #FFF76A;
            --primary-glow: rgba(255, 247, 106, 0.4);
            --text-main: #FFFFFF;
            --text-sub: #A0A0A0;
            --glass-bg: rgba(20, 20, 20, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);

            --font-display: 'Montserrat', 'Noto Sans JP', sans-serif;
            --font-body: 'Noto Sans JP', sans-serif;
            --font-accent: 'Oswald', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            font-size: 1.375rem;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Typography Utilities */
        .font-display {
            font-family: var(--font-display);
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        .font-accent {
            font-family: var(--font-accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .text-gradient {
            background: linear-gradient(135deg, #FFFFFF 0%, #888888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .text-primary-gradient {
            background: linear-gradient(135deg, #FFF76A 0%, #FF8C00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Premium UI Components */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .hover-lift {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.4s ease;
        }

        .hover-lift:hover {
            transform: translateY(-8px) !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 20px var(--primary-glow);
            border-color: rgba(255, 215, 0, 0.3);
        }

        /* Buttons */
        .btn-super {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem 3rem;
            background: linear-gradient(135deg, #FFF76A 0%, #FFB300 100%);
            color: #000;
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 900;
            text-decoration: none;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-super::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }

        .btn-super:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px var(--primary-glow);
        }

        .btn-super:hover::before {
            left: 100%;
        }

        .btn-outline {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 2rem;
            background: transparent;
            color: var(--primary);
            font-family: var(--font-display);
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            border: 2px solid var(--primary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* Layout Utilities */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .section-padding {
            padding: 8rem 0;
        }

        /* Nav */
        .nav-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .nav-links {
            display: none;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            .nav-links {
                display: flex;
            }
        }

        .nav-link {
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.25rem;
            font-weight: 700;
            transition: color 0.2s ease;
            position: relative;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 80px;
            overflow: hidden;
        }

        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(to bottom, rgba(5, 5, 5, 0.5) 0%, rgba(5, 5, 5, 0.7) 80%, rgba(5, 5, 5, 1) 100%);
        }

        .hero-particles {
            position: absolute;
            inset: 0;
            z-index: 2;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 900px;
            padding: 2rem;
        }

        .badge {
            display: inline-block;
            padding: 0.75rem 2.5rem;
            border-radius: 50px;
            border: 2px solid rgba(255, 215, 0, 0.5);
            background: rgba(255, 215, 0, 0.15);
            color: var(--primary);
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }

        .hero-title {
            font-size: clamp(4.5rem, 10vw, 8.5rem);
            line-height: 1.1;
            margin-bottom: 1.5rem;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .hero-subtitle {
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            color: var(--text-sub);
            margin-bottom: 4rem;
            font-weight: 500;
        }

        /* Section Headers */
        .section-header {
            text-align: center;
            margin-bottom: 5rem;
        }

        .section-title {
            font-size: clamp(4rem, 8vw, 5.5rem);
            margin-bottom: 1rem;
        }

        .section-line {
            width: 80px;
            height: 4px;
            background: var(--primary);
            margin: 0 auto;
            border-radius: 2px;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* Grids */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .grid-2 {
                grid-template-columns: repeat(2, 1fr);
                gap: 3rem;
            }

            .grid-3 {
                grid-template-columns: repeat(3, 1fr);
            }

            .grid-4 {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .grid-4 {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* Cards */
        .feature-card {
            padding: 3rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        .feature-title {
            font-size: 2.25rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        /* Stage specialized cards */
        .stage-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .stage-box:hover {
            background: rgba(255, 215, 0, 0.05);
            border-color: rgba(255, 215, 0, 0.3);
        }

        /* Pricing/Table */
        .pricing-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .pricing-table th,
        .pricing-table td {
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid var(--glass-border);
            text-align: left;
            font-size: 1.25rem;
        }

        @media (min-width: 768px) {

            .pricing-table th,
            .pricing-table td {
                padding: 1.5rem;
                font-size: 1.5rem;
            }
        }

        .pricing-table th {
            font-family: var(--font-accent);
            color: var(--text-sub);
            font-size: 1.25rem;
            letter-spacing: 0.1em;
        }

        .pricing-row {
            transition: background 0.2s;
        }

        .pricing-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Timeline */
        .timeline {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 24px;
            width: 2px;
            background: var(--glass-border);
        }

        @media (min-width: 768px) {
            .timeline::before {
                left: 50%;
                transform: translateX(-50%);
            }
        }

        .timeline-item {
            position: relative;
            margin-bottom: 1.5rem;
            padding-left: 60px;
        }

        @media (min-width: 768px) {
            .timeline-item {
                padding-left: 0;
                width: 50%;
                margin-bottom: 3rem;
            }

            .timeline-item:nth-child(odd) {
                padding-right: 50px;
                text-align: right;
            }

            .timeline-item:nth-child(even) {
                left: 50%;
                padding-left: 50px;
            }
        }

        .timeline-dot {
            position: absolute;
            left: 16px;
            top: 20px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--bg-color);
            border: 4px solid var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            z-index: 2;
        }

        @media (min-width: 768px) {
            .timeline-item:nth-child(odd) .timeline-dot {
                left: auto;
                right: -9px;
            }

            .timeline-item:nth-child(even) .timeline-dot {
                left: -9px;
            }
        }

        /* Animations */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-1 {
            animation-delay: 0.2s;
        }

        .delay-2 {
            animation-delay: 0.4s;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [scrolled, setScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const applicationUrl = "https://docs.google.com/forms/d/e/1FAIpQLSeQCrP79MVOQz9JqYtHNsCCrRSKIbBkrTfLA3MmzWGqSacIxQ/viewform?usp=header";

            const oshiItems = [
                { name: "ピンポン", price: "100円", effect: "挨拶代わりの一投。" },
                { name: "カラーボール", price: "300円", effect: "応援の意思表示。" },
                { name: "ビーチボール", price: "1,500円", effect: "ステージを彩る。演者の視界に確実に入る。" },
                { name: "ビーチボール（大）", price: "3,000円", effect: "目立つ。転換時の回収で存在感を発揮。" },
                { name: "ピンポンバズーカ", price: "5,000円", effect: "ステージへ向けて射出。一気に会場を沸かせる。" },
                { name: "バランスボール", price: "10,000円", effect: "巨大な愛。演者が抱えるほどの大きさ。" },
                { name: "バランスボール（銀）", price: "30,000円", effect: "会場ライティングが変化。VIP演出発動。" },
                { name: "バランスボール（金）", price: "50,000円", effect: "特効＋会場BGMが豪華に変化。" }
            ];

            const news = [
                { date: "2026.03.14", title: "出演クリエイター募集開始", description: "「それだけでは食っていけないクリエイター祭り2026」の参加者を募集開始いたしました。本気の30分ステージを創り上げてくれるクリエイターを募集しています！" },
                { date: "2026.03.10", title: "MC決定！", description: "イベントを熱く盛り上げる総合MCとして、●●の出演が決定しました！当日のステージをお楽しみに。" }
            ];

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { name: 'VISION', href: '#vision' },
                { name: 'CONTENTS', href: '#stage' },
                { name: 'BALL SYSTEM', href: '#oshiball' },
                { name: 'TIMETABLE', href: '#timetable' },
            ];

            return (
                <div className="app-wrapper">
                    {/* Header */}
                    <header className={`nav-header ${scrolled ? 'shadow-lg' : ''}`} style={{ background: scrolled ? 'rgba(5,5,5,0.95)' : 'rgba(5,5,5,0.5)' }}>
                        <div className="container nav-content">
                            <div className="font-display" style={{ fontSize: '1.25rem', fontWeight: 900 }}>
                                <span className="text-primary-gradient">それ食え祭</span> <span className="text-gray-500">2026</span>
                            </div>

                            <nav className="nav-links">
                                {navLinks.map(link => (
                                    <a key={link.name} href={link.href} className="nav-link font-accent">{link.name}</a>
                                ))}
                            </nav>

                            <div className="hidden lg:block" style={{ display: 'none' /* hidden on mobile, handle via media query conceptually */ }}>
                                <a href={applicationUrl} target="_blank" rel="noopener noreferrer" className="btn-outline" style={{ display: 'inline-flex', padding: '0.5rem 1.5rem', fontSize: '0.875rem' }}>
                                    ENTRY
                                </a>
                            </div>

                            {/* Mobile menu button */}
                            <button
                                className="lg:hidden"
                                style={{ background: 'transparent', border: 'none', color: 'white', fontSize: '2rem', display: 'block' }}
                                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                            >
                                ≡
                            </button>
                        </div>
                        {/* Mobile Menu Dropdown */}
                        {mobileMenuOpen && (
                            <div style={{ background: '#111', padding: '1rem 2rem', borderBottom: '1px solid #333' }}>
                                {navLinks.map(link => (
                                    <a key={link.name} href={link.href} onClick={() => setMobileMenuOpen(false)} style={{ display: 'block', padding: '1rem 0', color: 'white', textDecoration: 'none', fontWeight: 'bold' }}>
                                        {link.name}
                                    </a>
                                ))}
                                <a href={applicationUrl} target="_blank" rel="noopener noreferrer" style={{ display: 'block', padding: '1rem 0', color: '#FFF76A', textDecoration: 'none', fontWeight: 'bold' }}>
                                    出演応募はこちら &rarr;
                                </a>
                            </div>
                        )}
                    </header>

                    {/* Hero Section */}
                    <section id="home" className="hero">
                        <video autoPlay loop muted playsInline className="hero-video">
                            <source src="img/top.mp4" type="video/mp4" />
                        </video>
                        <div className="hero-bg"></div>
                        <div className="hero-particles"></div>
                        <div className="hero-content animate-fade-up">
                            <div className="badge">2026.5.29 20:00 START</div>
                            <h1 className="hero-title font-display">
                                <span className="text-primary-gradient" style={{ display: 'block', fontSize: 'clamp(1rem, 3vw, 2rem)', marginBottom: '0.5rem' }}>それだけでは食っていけないクリエイター祭り</span>
                                <span style={{ display: 'block', color: '#fff' }}>それ食え祭</span>
                                <span className="text-primary-gradient" style={{ display: 'block', marginTop: '0.5rem' }}>2026</span>
                            </h1>
                            <p className="hero-subtitle">
                                リアルの熱狂をぶつけろ！<br />
                                ファンと創る、一夜限りの<br />
                                プレミアステージ
                            </p>
                            <div style={{ marginTop: '2rem' }}>
                                <a href={applicationUrl} target="_blank" rel="noopener noreferrer" className="btn-super">
                                    出演応募はこちら
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* NEWS */}
                    <section id="news" className="section-padding">
                        <div className="container">
                            <div className="section-header">
                                <h2 className="section-title font-display text-gradient">NEWS</h2>
                                <div className="section-line"></div>
                            </div>
                            <div className="glass-panel hover-lift" style={{ padding: '3rem' }}>
                                <div className="space-y-8" style={{ display: 'flex', flexDirection: 'column', gap: '2rem' }}>
                                    {news.map((item, index) => (
                                        <div key={index} style={{ borderBottom: index < news.length - 1 ? '1px solid rgba(255,255,255,0.1)' : 'none', paddingBottom: index < news.length - 1 ? '2rem' : '0' }}>
                                            <h3 className="mb-2 font-bold font-display" style={{ color: 'var(--primary)', fontSize: '1.25rem', marginBottom: '0.5rem' }}>{item.date}　{item.title}</h3>
                                            <p style={{ color: 'var(--text-main)' }}>{item.description}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* VISION */}
                    <section id="vision" className="section-padding" style={{ position: 'relative', overflow: 'hidden' }}>
                        <div style={{ position: 'absolute', inset: 0, backgroundImage: 'url("img/vision.jpeg")', backgroundSize: 'cover', backgroundPosition: 'center', zIndex: 0 }}></div>
                        <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to bottom, rgba(5, 5, 5, 1) 0%, rgba(5, 5, 5, 0.35) 20%, rgba(5, 5, 5, 0.35) 80%, rgba(5, 5, 5, 1) 100%)', zIndex: 1 }}></div>
                        <div className="container" style={{ position: 'relative', zIndex: 10 }}>
                            <div className="section-header animate-fade-up">
                                <h2 className="section-title font-display text-primary-gradient">VISION</h2>
                                <div className="section-line"></div>
                            </div>

                            <div className="feature-card animate-fade-up delay-1" style={{ maxWidth: '900px', margin: '0 auto', background: 'transparent', border: 'none', boxShadow: 'none' }}>
                                <h4 style={{ color: '#fff', fontSize: '1.25rem', marginBottom: '1rem', fontWeight: 700, textShadow: '0 2px 10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.6)' }}>クリエイティビティを爆発させる本気のステージ</h4>
                                <p style={{ color: '#fff', marginBottom: '1.5rem', textShadow: '0 2px 10px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 0, 0, 0.6)', fontWeight: 500 }}>
                                    動画メディアで確かなコミュニティを築き上げてきた表現者たち。しかし、画面の中だけでは伝えきれない表現衝動や、まだ見ぬポテンシャルが眠っているはずです。デジタルな繋がりを超え、クリエイターの「本気のパフォーマンス」をリアルな会場で解き放ち、ファンと共に新しい伝説を「本気」で創ります。
                                </p>
                                <h4 style={{ color: '#fff', fontSize: '1.25rem', marginBottom: '1rem', fontWeight: 700, marginTop: '2.5rem', textShadow: '0 2px 10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.6)' }}>熱量の可視化</h4>
                                <p style={{ color: '#fff', textShadow: '0 2px 10px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 0, 0, 0.6)', fontWeight: 500 }}>
                                    参加者やファンはステージに向かって「リアル投げ銭（ボール）」を投げまくります！ステージや演者にあたってもお構いなし！<br />
                                    ファンの熱量とクリエイターの熱量がぶつかり合う「日本一距離が近い」プレミアムイベントです。
                                </p>
                            </div>
                        </div>
                    </section>



                    {/* CONTENTS */}
                    <section id="stage" className="section-padding">
                        <div className="container">
                            <div className="section-header">
                                <h2 className="section-title font-display text-primary-gradient">CONTENTS</h2>
